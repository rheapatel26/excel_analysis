services:
  - type: web
    name: claimiq
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: Insure
        sync: false # User will set this in Render dashboard
      - key: PYTHON_VERSION
        value: 3.10.0
